name: ci

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install CI tools
        run: |
          pip install pre-commit
          go install gotest.tools/gotestsum@v1.13.0

      - name: make ci
        run: make ci

      - name: Upload test and coverage artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            junit.xml
            cover.out

  test-report:
    name: Test summary
    runs-on: ubuntu-latest
    needs: test
    if: ${{ !cancelled() && github.event_name == 'pull_request' }}
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          name: test-results

      - name: Publish test summary
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: junit.xml
          comment_mode: always

  coverage-report:
    name: Code coverage
    runs-on: ubuntu-latest
    needs: test
    if: ${{ !cancelled() && github.event_name == 'pull_request' }}
    permissions:
      contents: read
      actions: read
      pull-requests: write
    steps:
      - name: Post coverage comment
        uses: fgrosse/go-coverage-report@v1.3.0
        with:
          coverage-artifact-name: test-results
          coverage-file-name: cover.out
