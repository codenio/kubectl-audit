name: ci

run-name: >-
  ${{ github.event_name == 'pull_request'
      && format('CI · PR #{0} · {1} → {2}', github.event.pull_request.number, github.head_ref, github.base_ref)
      || format('CI · push · {0}', github.ref_name) }}

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install CI tools
        run: |
          pip install pre-commit
          go install gotest.tools/gotestsum@v1.13.0

      - name: make ci
        run: make ci

      - name: Upload test and coverage artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            junit.xml
            cover.out

  test-report:
    name: PR test summary
    runs-on: ubuntu-latest
    needs: test
    if: ${{ !cancelled() && github.event_name == 'pull_request' }}
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          name: test-results

      - name: Publish test summary
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: junit.xml
          comment_mode: always

  coverage-report:
    name: PR coverage report
    runs-on: ubuntu-latest
    needs: test
    if: ${{ !cancelled() && github.event_name == 'pull_request' }}
    permissions:
      contents: read
      actions: read
      pull-requests: write
    steps:
      - name: Post coverage comment
        uses: fgrosse/go-coverage-report@v1.3.0
        with:
          coverage-artifact-name: test-results
          coverage-file-name: cover.out
