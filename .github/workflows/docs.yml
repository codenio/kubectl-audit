name: docs

run-name: >-
  ${{ github.event_name == 'workflow_dispatch'
      && 'Docs · manual deploy'
      || format('Docs · deploy · {0}', github.ref_name) }}

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install MkDocs
        run: pip install mkdocs-material
      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force
