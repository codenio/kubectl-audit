version: 2

project_name: audit

release:
  github:
    owner: codenio
    name: kubectl-audit
  # Re-running a tag: GitHub rejects duplicate asset names unless we replace them first.
  replace_existing_artifacts: true

builds:
  - id: audit
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
      - "386"
    env:
      - CGO_ENABLED=0
      - GO111MODULE=on
    main: cmd/plugin/main.go
    ldflags:
      - -s -w

archives:
  - id: audit
    ids:
      - audit
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: zip
