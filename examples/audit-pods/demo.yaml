# Demo for `kubectl audit pods` — healthy, image pull, crash loop, and completed Job pod.
---
apiVersion: v1
kind: Namespace
metadata:
  name: kubectl-audit-pods-demo
  labels:
    demo: kubectl-audit-pods
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubectl-audit-demo-healthy
  namespace: kubectl-audit-pods-demo
  labels:
    demo: kubectl-audit-pods
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubectl-audit-healthy
  template:
    metadata:
      labels:
        app: kubectl-audit-healthy
        demo: kubectl-audit-pods
    spec:
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.9
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubectl-audit-demo-badpod
  namespace: kubectl-audit-pods-demo
  labels:
    demo: kubectl-audit-pods
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubectl-audit-badpod
  template:
    metadata:
      labels:
        app: kubectl-audit-badpod
        demo: kubectl-audit-pods
    spec:
      containers:
        - name: app
          image: invalid.registry.kubectl-audit.example/no-such-image:0
          imagePullPolicy: Always
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubectl-audit-demo-crashloop
  namespace: kubectl-audit-pods-demo
  labels:
    demo: kubectl-audit-pods
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubectl-audit-crashloop
  template:
    metadata:
      labels:
        app: kubectl-audit-crashloop
        demo: kubectl-audit-pods
    spec:
      containers:
        - name: crash
          image: busybox:1.36
          command: ["sh", "-c", "exit 1"]
---
apiVersion: batch/v1
kind: Job
metadata:
  name: kubectl-audit-demo-completed
  namespace: kubectl-audit-pods-demo
  labels:
    demo: kubectl-audit-pods
spec:
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        demo: kubectl-audit-pods
    spec:
      restartPolicy: Never
      containers:
        - name: done
          image: busybox:1.36
          command: ["sh", "-c", "echo ok"]
