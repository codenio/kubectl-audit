# Demo for `kubectl audit cronjobs` (suspended CronJob).
---
apiVersion: v1
kind: Namespace
metadata:
  name: kubectl-audit-cronjob-demo
  labels:
    demo: kubectl-audit-cronjob
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: kubectl-audit-demo-suspended
  namespace: kubectl-audit-cronjob-demo
  labels:
    demo: kubectl-audit-cronjob
spec:
  schedule: "0 0 1 1 *"
  suspend: true
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 0
  failedJobsHistoryLimit: 0
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            demo: kubectl-audit-cronjob
        spec:
          restartPolicy: OnFailure
          containers:
            - name: hello
              image: busybox:1.36
              command: ["echo", "hello"]
